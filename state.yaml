parent_genome:
  inherited_from: "교리퀴즈(시스템)"
  version: "2026-04-25"

contest_meta:
  name: "드림아동부 교리퀴즈대회"
  date_planned: "2026-04-26"
  church: "드림교회"
  department: "아동부"
  target_audience: "초등 1~6학년 (드림아동부)"
  modes: ["team", "individual"]
  team_config:
    num: 4
    names: ["빨강팀", "파랑팀", "노랑팀", "초록팀"]
    rule: "free_buzz"
  individual_config:
    mvp_top_n: 3

# 7과 메타 (Doctrine-Quiz 앱의 THEOLOGY_TOPICS에서 차용)
topics:
  - id: bibliology
    lesson_no: 1
    title: "성경론"
    sub_title: "하나님의 특별한 편지"
    emoji: "📖"
    color: "#60a5fa"            # bg-blue-400
    verse: "주의 말씀은 내 발에 등이요 내 길에 빛이니이다 (시 119:105)"
  - id: theology_proper
    lesson_no: 2
    title: "신론"
    sub_title: "우리를 만드신 하나님"
    emoji: "✨"
    color: "#facc15"            # bg-yellow-400
    verse: "태초에 하나님이 천지를 창조하시니라 (창 1:1)"
  - id: christology
    lesson_no: 3
    title: "기독론"
    sub_title: "우리의 유일한 구원자"
    emoji: "✝️"
    color: "#f87171"            # bg-red-400
    verse: "내가 곧 길이요 진리요 생명이니 (요 14:6)"
  - id: pneumatology
    lesson_no: 4
    title: "성령론"
    sub_title: "함께하시는 도우미"
    emoji: "🌬️"
    color: "#2dd4bf"            # bg-teal-400
    verse: "보혜사 곧 성령 그가 너희에게 모든 것을 가르치고 (요 14:26)"
  - id: soteriology
    lesson_no: 5
    title: "구원론"
    sub_title: "가장 큰 선물, 구원"
    emoji: "🎁"
    color: "#818cf8"            # bg-indigo-400
    verse: "너희는 그 은혜에 의하여 믿음으로 말미암아 구원을 받았으니 (엡 2:8)"
  - id: ecclesiology
    lesson_no: 6
    title: "교회론"
    sub_title: "함께하는 천국 가족"
    emoji: "⛪"
    color: "#c084fc"            # bg-purple-400
    verse: "너희는 그리스도의 몸이요 지체의 각 부분이라 (고전 12:27)"
  - id: eschatology
    lesson_no: 7
    title: "종말론"
    sub_title: "기다려지는 새로운 시작"
    emoji: "🌈"
    color: "#f472b6"            # bg-pink-400
    verse: "보라 내가 만물을 새롭게 하노라 (계 21:5)"

# 7가지 문제 스타일
styles:
  - { id: mc,       label: "객관식",  emoji: "🔢", origin: "DOCX 자료1" }
  - { id: ox,       label: "OX",      emoji: "⭕", origin: "DOCX 자료1" }
  - { id: fill,     label: "빈칸",    emoji: "📝", origin: "DOCX 자료1" }
  - { id: open,     label: "주관식",  emoji: "💭", origin: "DOCX 자료1" }
  - { id: apply,    label: "적용",    emoji: "🌱", origin: "DOCX 자료1" }
  - { id: nonsense, label: "넌센스",  emoji: "🤪", origin: "신규 생성" }
  - { id: image,    label: "그림",    emoji: "🖼", origin: "신규 생성" }

# 4가지 보상 타입
reward_types:
  - { id: collect, label: "수집",   emoji: "🎯", weight: 70, desc: "재료 풀에서 1개 선택" }
  - { id: steal,   label: "빼앗기", emoji: "🔥", weight: 15, desc: "다른 팀 재료 1개 가져옴" }
  - { id: gift,    label: "선물",   emoji: "🎁", weight: 10, desc: "본인 +2 + 다른 팀에 +1 선물" }
  - { id: swap,    label: "교환",   emoji: "♻️", weight: 5,  desc: "다른 팀과 재료 1개 교환" }

# 마라탕 재료 풀 (12종)
ingredients:
  - { id: bok_choy,     name: "청경채",   emoji: "🥬" }
  - { id: tofu,         name: "두부",     emoji: "🍢" }
  - { id: lamb,         name: "양고기",   emoji: "🍖" }
  - { id: beef,         name: "소고기",   emoji: "🥩" }
  - { id: shrimp,       name: "새우",     emoji: "🦐" }
  - { id: fish_cake,    name: "어묵",     emoji: "🍥" }
  - { id: noodle,       name: "쌀국수",   emoji: "🍜" }
  - { id: shiitake,     name: "표고버섯", emoji: "🍄" }
  - { id: enoki,        name: "팽이버섯", emoji: "🌾" }
  - { id: bean_sprout,  name: "숙주",     emoji: "🌱" }
  - { id: glass_noodle, name: "분모자",   emoji: "🍝" }
  - { id: corn_noodle,  name: "옥수수면", emoji: "🌽" }

# 파이프라인 진행 상태
pipeline:
  steps:
    - { id: 1, name: "DOCX 파싱 (자료1, 7과 70문제 — 5·6과 발견)", status: completed, output: "outputs/quizzes-from-docx.json", actual_count: 70 }
    - { id: 2, name: "[skip] PDF 5·6과 신규 생성",          status: skipped, reason: "자료1 DOCX에 7과 모두 포함되어 불필요" }
    - { id: 3, name: "넌센스+그림 신규 (30문제)",            status: completed, output: "outputs/quizzes-extras.json", actual_count: 30 }
    - { id: 4, name: "통합 + difficulty + reward_type",     status: completed, output: "outputs/quizzes.json", actual_count: 100 }
    - { id: 5, name: "이미지 생성 (Pollinations)",            status: completed, output: "outputs/images/", actual_count: 15 }
    - { id: 6, name: "웹앱 빌드 (통합 SPA)",                  status: completed, output: "webapp/data.js + webapp/index.html (1 SPA)" }
    - { id: 7, name: "Flask 자동 저장 백엔드",                status: completed, output: "scripts/05_serve.py + outputs/sessions/" }
    - { id: 8, name: "[pending] 디자인 수정 v2 (M1~M8)",     status: pending, blocked_by: "사용자 swap 처리 결정 대기" }

# 최신 상태 요약 (저장 시점: 2026-04-25)
status_snapshot:
  saved_at: "2026-04-25"
  next_action: "사용자 결정 후 M1~M8 일괄 적용 (예상 30분)"
  pending_decisions:
    - swap_reward_type: "(a) 양 팀 +1 협력 / (b) collect 흡수 / (c) 재료 종류 유지"
  resume_doc: "PROGRESS.md (이 폴더)"

